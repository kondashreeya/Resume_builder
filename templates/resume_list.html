<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume List</title>

    <style>
        body { font-family: Arial; background: #f4f4f4; }

        .container {
            width: 80%;
            margin: 30px auto;
            background: white;
            padding: 20px;
        }

        .btn {
            padding: 8px 15px;
            background: black;
            color: white;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        table, th, td {
            border: 1px solid black;
        }

        th, td {
            padding: 10px;
            text-align: center;
        }
    </style>
</head>

<body>

<div class="container">

    <h2>Resume List</h2>

    <a href="/form/">
        <button class="btn">+ Create Resume</button>
    </a>

    <br><br>

    <table>
        <tr>
    <th>S.No</th>
    <th>Name</th>
    <th>View</th>
    <th>Edit</th>
    <th>Download</th>
</tr>

{% for resume in resumes %}
<tr>
    <td>{{ forloop.counter }}</td>
    <td>{{ resume.name }}</td>
    <td><a href="{% url 'view_resume' resume.id %}">View</a></td>
    <td><a href="{% url 'edit' resume.id %}">Edit</a></td>
    <td>
        <a href="{% url 'view_resume' resume.id %}?print=1" target="_blank">
        Download
        </a>
    </td>
</tr>
{% endfor %}
    </table>

</div>

</body>
</html>
